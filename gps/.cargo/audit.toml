# cargo-audit configuration for the GeoSpoof GPS workspace.
# Picked up automatically when `cargo audit` runs from `gps/` (design §10a.3 CI).

[advisories]
# RUSTSEC-2023-0071 — "Marvin Attack" RSA timing sidechannel in the `rsa` crate.
#
# Why ignored (documented rationale, per DEPENDENCY_POLICY.md):
#   * No fixed version exists — RustSec lists "No safe upgrade is available"; a
#     constant-time reimplementation is still in progress upstream
#     (https://github.com/RustCrypto/RSA/issues/626).
#   * `rsa` is a HARD, transitive dependency of `idevice` (device pairing/lockdown
#     crypto), not something we select — it cannot be dropped without dropping the
#     engine. Verified: `cargo tree -i rsa` -> idevice 0.1.64 only.
#   * Not exploitable in our threat model. The advisory's own workaround: "local use
#     on a non-compromised computer is fine." We use RSA only for local device pairing
#     over USB / a private overlay, where an attacker cannot observe the fine-grained
#     decryption timing the Marvin attack requires.
# Revisit when idevice ships a `rsa` release with the constant-time fix.
ignore = ["RUSTSEC-2023-0071"]
