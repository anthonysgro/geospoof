# cargo-deny config for the GeoSpoof GPS workspace (design §10a.3).
# Checks: security advisories, license allow-list, dependency bans, source trust.

[advisories]
# Fail the build on known vulnerabilities (RustSec). Add IDs here only with a
# documented rationale + tracking link if a fix is genuinely unavailable.
ignore = []

[licenses]
# Our own code is source-available under FSL-1.1-MIT, but every third-party dependency
# we ship must be permissive/MIT-compatible. This allow-list governs dependencies;
# additions require review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.8
# Our own workspace crates (publish = false) are licensed via license-file (FSL-1.1-MIT,
# not an SPDX id). Skip them in the license check — this allow-list is for dependencies.
private = { ignore = true }

[bans]
# We pin idevice exactly; discourage wildcard version requirements. Duplicate
# transitive versions are a warning (common in large trees), not a hard failure yet.
multiple-versions = "warn"
wildcards = "deny"
# Our own workspace crates are referenced by path (no version) — that's expected for
# internal, unpublished members, so don't treat those as banned wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
