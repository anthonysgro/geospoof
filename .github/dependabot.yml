version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      timezone: Etc/UTC
    groups:
      github-actions:
        patterns:
          - "*"
    allow:
      - dependency-type: all
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      timezone: Etc/UTC
    groups:
      npm-dependencies:
        patterns:
          - "*"
    allow:
      - dependency-type: all
    cooldown:
      default-days: 7
    ignore:
      # Hold TypeScript on its current major until typescript-eslint supports
      # TypeScript 7 (its peer range currently caps at <6.1.0). Remove this
      # once the linter toolchain ships TS 7 support, then upgrade deliberately.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: swift
    directory: "/safari"
    schedule:
      interval: daily
      timezone: Etc/UTC
    cooldown:
      default-days: 7
