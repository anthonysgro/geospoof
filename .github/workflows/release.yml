name: Release

on:
  push:
    tags:
      - "v*"

# NOTE: The macOS DMG is intentionally NOT built here. It is unsupported and its
# build was red-X'ing tag releases, so it is decoupled from the release pipeline.
# Rebuild/attach a DMG on demand via the manual "Release macOS DMG (manual)"
# workflow (.github/workflows/release-macos-dmg.yml).

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: cp .env.example .env

      - name: Extract version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE_VERSION="${TAG#v}"
          echo "BASE_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${BASE_VERSION}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Verify version match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$BASE_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Tag version '$BASE_VERSION' does not match package.json version '$PKG_VERSION'" >&2
            exit 1
          fi

      # ── Build Firefox & package source ──
      - run: npm run package:xpi
      - run: npm run package:source

      # ── Save clean dist for AMO signing later ──
      - name: Backup dist for AMO
        run: cp -r dist dist-amo

      # ── Unlisted (self-hosted) signing ──
      - name: Inject build version for unlisted
        run: jq --arg v "$BUILD_VERSION" '.version = $v' dist/manifest.json > dist/manifest.tmp && mv dist/manifest.tmp dist/manifest.json

      - name: Sign XPI (unlisted)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: bash scripts/sign-xpi.sh --channel unlisted

      - name: Rename signed XPI
        run: |
          SIGNED=$(find web-ext-artifacts -name '*.xpi' ! -name "geospoof-firefox-v${BASE_VERSION}-unsigned.xpi" | head -1)
          if [ -n "$SIGNED" ]; then
            mv "$SIGNED" "web-ext-artifacts/geospoof-firefox-v${BASE_VERSION}-signed.xpi"
          fi

      # ── Listed (AMO) signing ──
      - name: Restore clean dist for AMO
        run: rm -rf dist && mv dist-amo dist

      - name: Strip update_url for AMO
        run: jq 'del(.browser_specific_settings.gecko.update_url)' dist/manifest.json > dist/manifest.tmp && mv dist/manifest.tmp dist/manifest.json

      - name: Sign XPI (listed/AMO)
        continue-on-error: true
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: bash scripts/sign-xpi.sh --channel listed --source geospoof-source-v${BASE_VERSION}.zip

      # ── Chromium ──
      - name: Package Chromium
        run: npm run package:chromium

      # ── Update manifest for self-hosted Firefox auto-updates ──
      - name: Generate update manifest
        run: |
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/geospoof-firefox-v${BASE_VERSION}-signed.xpi"
          bash scripts/generate-update-manifest.sh "$BUILD_VERSION" "$DOWNLOAD_URL"

      # ── Collect release artifacts ──
      - name: Collect release artifacts
        run: |
          mkdir -p release-assets
          cp "web-ext-artifacts/geospoof-firefox-v${BASE_VERSION}-signed.xpi" release-assets/
          cp "web-ext-artifacts/geospoof-firefox-v${BASE_VERSION}-unsigned.xpi" release-assets/
          cp "web-ext-artifacts/geospoof-chromium-v${BASE_VERSION}.zip" release-assets/
          cp "geospoof-source-v${BASE_VERSION}.zip" release-assets/

      # ── Single GitHub Release with all artifacts ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ env.BASE_VERSION }}
          files: release-assets/*
          generate_release_notes: true

      # gh-pages only needs to serve the Firefox self-hosted update manifest
      # (update.json, referenced by the extension's update_url at
      # anthonysgro.github.io/geospoof/update.json) plus the Jekyll-bypass
      # marker. Stage exactly those into a clean directory so the published
      # branch never carries repo source.
      #
      # No CNAME here on purpose: a CNAME=geospoof.com made GitHub Pages
      # 301-redirect the github.io update URL to geospoof.com (served by Vercel,
      # which has no /update.json), 404ing the manifest and breaking Firefox
      # self-hosted auto-updates. geospoof.com belongs to Vercel; Pages serves
      # only at the plain github.io path.
      - name: Stage GitHub Pages content
        run: |
          mkdir -p pages-dist
          cp update.json pages-dist/update.json
          touch pages-dist/.nojekyll

      - name: Deploy update manifest to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-dist
          publish_branch: gh-pages
          # Publish ONLY the staged artifacts. The previous `publish_dir: .` +
          # `keep_files: true` mirrored the entire repo onto gh-pages and never
          # removed deleted files, leaving a stale, internally-inconsistent
          # source tree that broke branch builds (e.g. Vercel previews). A clean
          # minimal publish keeps gh-pages to just what GitHub Pages serves.
          keep_files: false
