name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: cp .env.example .env

      - name: Extract version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE_VERSION="${TAG#v}"
          echo "BASE_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${BASE_VERSION}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Verify version match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$BASE_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Tag version '$BASE_VERSION' does not match package.json version '$PKG_VERSION'" >&2
            exit 1
          fi

      # ── Build Firefox & package source ──
      - run: npm run package:xpi
      - run: npm run package:source

      # ── Save clean dist for AMO signing later ──
      - name: Backup dist for AMO
        run: cp -r dist dist-amo

      # ── Unlisted (self-hosted) signing ──
      - name: Inject build version for unlisted
        run: jq --arg v "$BUILD_VERSION" '.version = $v' dist/manifest.json > dist/manifest.tmp && mv dist/manifest.tmp dist/manifest.json

      - name: Sign XPI (unlisted)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: bash scripts/sign-xpi.sh --channel unlisted

      - name: Rename signed XPI
        run: |
          SIGNED=$(find web-ext-artifacts -name '*.xpi' ! -name "geospoof-firefox-v${BASE_VERSION}-unsigned.xpi" | head -1)
          if [ -n "$SIGNED" ]; then
            mv "$SIGNED" "web-ext-artifacts/geospoof-firefox-v${BASE_VERSION}-signed.xpi"
          fi

      # ── Listed (AMO) signing ──
      - name: Restore clean dist for AMO
        run: rm -rf dist && mv dist-amo dist

      - name: Strip update_url for AMO
        run: jq 'del(.browser_specific_settings.gecko.update_url)' dist/manifest.json > dist/manifest.tmp && mv dist/manifest.tmp dist/manifest.json

      - name: Sign XPI (listed/AMO)
        continue-on-error: true
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: bash scripts/sign-xpi.sh --channel listed --source geospoof-source-v${BASE_VERSION}.zip

      # ── Chromium ──
      - name: Package Chromium
        run: npm run package:chromium

      # ── Update manifest for self-hosted Firefox auto-updates ──
      - name: Generate update manifest
        run: |
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/geospoof-firefox-v${BASE_VERSION}-signed.xpi"
          bash scripts/generate-update-manifest.sh "$BUILD_VERSION" "$DOWNLOAD_URL"

      # ── Collect release artifacts ──
      - name: Collect release artifacts
        run: |
          mkdir -p release-assets
          cp "web-ext-artifacts/geospoof-firefox-v${BASE_VERSION}-signed.xpi" release-assets/
          cp "web-ext-artifacts/geospoof-firefox-v${BASE_VERSION}-unsigned.xpi" release-assets/
          cp "web-ext-artifacts/geospoof-chromium-v${BASE_VERSION}.zip" release-assets/
          cp "geospoof-source-v${BASE_VERSION}.zip" release-assets/

      # ── Single GitHub Release with all artifacts ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ env.BASE_VERSION }}
          files: release-assets/*
          generate_release_notes: true

      - name: Deploy site and update manifest to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          include_files: update.json

  release-macos:
    needs: release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: safari

      - run: npm ci
      - run: cp .env.example .env

      - name: Extract version
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE_VERSION="${TAG#v}"
          echo "BASE_VERSION=${BASE_VERSION}" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      # ── Import Developer ID Application cert into a temporary keychain ──
      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      # ── Place App Store Connect API key where fastlane's Appfile expects it ──
      - name: Place App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_UZBN452J8D.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_UZBN452J8D.p8"

      # ── Install Developer ID provisioning profiles ──
      # Both macOS targets use App Groups, which requires an explicit provisioning
      # profile even when signing manually with a Developer ID cert.
      # Profiles must be Developer ID Application type with App Groups enabled.
      - name: Install Developer ID provisioning profiles
        env:
          PROFILE_APP_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_PROFILE_APP }}
          PROFILE_EXT_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_PROFILE_EXT }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_APP_BASE64" | base64 --decode > "$PROFILES_DIR/geospoof_macos_app.provisionprofile"
          echo "$PROFILE_EXT_BASE64" | base64 --decode > "$PROFILES_DIR/geospoof_macos_ext.provisionprofile"

      - name: Build, notarize, and package DMG
        working-directory: safari
        run: bundle exec fastlane mac developer_id

      - name: Rename DMG to release naming convention
        run: mv "safari/build/GeoSpoof.dmg" "safari/build/geospoof-macos-v${BASE_VERSION}.dmg"

      - name: Attach DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: safari/build/geospoof-macos-v${{ env.BASE_VERSION }}.dmg

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
