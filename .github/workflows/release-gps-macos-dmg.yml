name: Release GeoSpoof GPS DMG

# Builds the GeoSpoof GPS desktop agent as a Developer-ID-signed, notarized macOS DMG
# (design §13e / §17), uploads it as a workflow artifact, and publishes it as a SEPARATE
# GitHub release tagged `gps-v<version>`.
#
# Triggers:
#   * push of a `gps-v*` tag (auto build + publish; created by gps/scripts/release.sh), or
#   * manual dispatch (artifact-only unless `publish_release` is on) for test builds.
#
# IMPORTANT — GeoSpoof GPS versions independently of the browser extension. Its releases
# use a `gps-v` tag prefix (e.g. gps-v0.1.0) so they:
#   * are a distinct release track from the extension's `v<version>` releases, and
#   * never match the extension `Release` workflow's `v*` tag trigger (so publishing a
#     GPS build cannot kick off / fail the extension pipeline).
#
# The heavy lifting lives in gps/packaging/build-dmg.sh; this workflow just provisions
# the signing identity + App Store Connect key and calls it.
#
# Reuses the EXISTING secrets from release-macos-dmg.yml — nothing new to configure:
#   MACOS_DEVELOPER_ID_P12 / MACOS_DEVELOPER_ID_P12_PASSWORD  Developer ID Application cert
#   MACOS_KEYCHAIN_PASSWORD                                   temp keychain password
#   ASC_API_KEY_P8                                            App Store Connect API key (.p8)
#
# The App Store Connect key id + issuer id are NOT secrets (they're identifiers, already
# committed in safari/fastlane/Fastfile), so they default to the repo's known values
# below. Override with optional ASC_KEY_ID / ASC_ISSUER_ID secrets if the key ever rotates.

on:
  # Auto-release on a `gps-v*` tag push (mirrors the extension's `v*` flow, but a
  # separate namespace). `gps/scripts/release.sh` creates these tags.
  push:
    tags:
      - "gps-v*"
  # Manual dispatch for test builds (artifact only unless publish_release is on).
  workflow_dispatch:
    inputs:
      version:
        description: "GPS version WITHOUT any prefix (e.g. 0.1.0). Leave empty to use the gps/Cargo.toml workspace version. Keep it in sync with gps/Cargo.toml."
        required: false
      publish_release:
        description: "Publish a separate GeoSpoof GPS release tagged gps-v<version> (independent of the extension's v<version> releases). Leave OFF to only upload a downloadable artifact."
        type: boolean
        default: false

jobs:
  build-dmg:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version + tag
        run: |
          CARGO_VERSION=$(awk -F'"' '/^version = /{print $2; exit}' gps/Cargo.toml)
          PUBLISH=false
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag-triggered: version comes from the tag, and MUST match Cargo.toml.
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#gps-v}"
            if [ "$VERSION" != "$CARGO_VERSION" ]; then
              echo "::error::Tag $TAG (version $VERSION) does not match gps/Cargo.toml version $CARGO_VERSION" >&2
              exit 1
            fi
            PUBLISH=true
          else
            # Manual dispatch: version from input (else Cargo.toml); publish only if asked.
            VERSION="${{ inputs.version }}"
            [ -z "$VERSION" ] && VERSION="$CARGO_VERSION"
            TAG="gps-v$VERSION"
            [ "${{ inputs.publish_release }}" = "true" ] && PUBLISH=true
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "GPS_TAG=$TAG" >> "$GITHUB_ENV"
          echo "PUBLISH=$PUBLISH" >> "$GITHUB_ENV"
          echo "Building GeoSpoof GPS v$VERSION (tag $TAG), publish=$PUBLISH"

      - name: Install Rust toolchain + Apple targets
        run: |
          rustup update stable
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"

      - name: Resolve signing identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep -m1 "Developer ID Application" | sed -E 's/.*"(.*)"/\1/')
          if [ -z "$IDENTITY" ]; then echo "No Developer ID Application identity found" >&2; exit 1; fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Place App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "ASC_API_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build, sign, notarize DMG
        env:
          VERSION: ${{ env.VERSION }}
          # Default to the repo's known ASC identifiers (safari/fastlane/Fastfile);
          # override via secrets only if the key rotates.
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID || 'BXMZW4LMSP' }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || '2a0c5baa-92b0-489c-b4c7-b1771b5e6df8' }}
        run: bash gps/packaging/build-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: geospoof-gps-dmg
          path: gps/target/pkg/*.dmg
          if-no-files-found: error

      # Publish a SEPARATE GeoSpoof GPS release (tag `gps-v<version>`), created if it
      # doesn't exist. Runs under GITHUB_TOKEN, whose tag creation does NOT trigger the
      # extension's tag-push `Release` workflow — and `gps-v*` wouldn't match its `v*`
      # trigger anyway. Fully independent of the extension release track.
      - name: Publish GeoSpoof GPS release
        if: ${{ env.PUBLISH == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GPS_TAG }}
          name: GeoSpoof GPS v${{ env.VERSION }}
          draft: false
          files: gps/target/pkg/*.dmg

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
